                    <p><strong>Tools Used:</strong> [Write which AI you used - ChatGPT, DALL-E, Midjourney, etc.]</p>

                    <p><strong>What AI Helped With:</strong> AI image generation let me quickly visualize different design directions for the plaza — a shade-and-comfort version, a community activation version, and a final synthesis. Seeing the concepts as rendered images helped me understand which elements worked together and which felt wrong for the site.</p>

                    <p><strong>What AI Got Wrong:</strong> Early AI-generated images showed a generic city park that could have been anywhere — no connection to Harlem's specific character. I had to refine my prompts to get images that felt appropriate for Hamilton Heights: warmer, denser, more urban, with people who look like they actually live in the neighborhood.</p>

                    <p><strong>What Required My Judgment:</strong> AI cannot understand that Hamilton Heights is a predominantly Dominican-American neighborhood where bilingual signage is a baseline, not an extra. AI cannot feel the difference between a plaza that serves existing residents and one that signals gentrification. The decision about who this design is for came entirely from understanding the specific community, not from any AI output.</p>
